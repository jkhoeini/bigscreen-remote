<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Bigscreen Remote</title>

  <meta name="theme-color" content="#16191d">
  <meta name="description" content="Remote control for KDE Plasma Bigscreen">

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bigscreen">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      color-scheme: dark;

      --bg-base: #000000;
      --bg-surface: #16191d;
      --bg-elevated: #232629;
      --bg-inset: #0b0d0f;

      --accent: #3daee9;
      --accent-dim: #1e6a94;
      --accent-purple: #7c5fd3;
      --accent-purple-dim: #4b3a82;

      --btn-bg: #24282e;
      --btn-bg-active: #3daee9;
      --btn-bg-active-subtle: #31363b;
      --btn-border: #31363b;
      --btn-border-active: #3daee9;
      --btn-danger: #da4453;
      --btn-danger-active: #a3323e;

      --text-primary: #fcfcfc;
      --text-secondary: #9aa1a9;
      --text-disabled: #4d5157;
      --text-on-accent: #0d1114;
      --status-ok: #2ecc71;
      --status-warn: #f67400;

      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    /* ---------- Reset / app shell ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", Roboto, "Noto Sans", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      position: fixed;
      inset: 0;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #app {
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: var(--safe-top) max(var(--safe-right), 12px)
               max(var(--safe-bottom), 12px) max(var(--safe-left), 12px);
    }

    .gesture-surface { touch-action: none; }

    /* ---------- Status bar ---------- */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--btn-danger);
      flex-shrink: 0;
    }

    .status-dot.connected { background: var(--status-ok); }
    .status-dot.connecting { background: var(--status-warn); }

    /* ---------- Setup form ---------- */
    .setup-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 24px;
      width: 100%;
      max-width: 320px;
    }

    .setup-form label {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .setup-form input {
      font: inherit;
      background: var(--bg-inset);
      color: var(--text-primary);
      border: 1px solid var(--btn-border);
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      outline: none;
    }

    .setup-form input:focus {
      border-color: var(--accent);
    }

    /* ---------- Remote body ---------- */
    .remote-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-surface);
      border-radius: 20px;
    }

    .placeholder {
      color: var(--text-disabled);
      font-size: 0.875rem;
    }

    /* ---------- Buttons ---------- */
    button {
      font: inherit;
      color: var(--text-primary);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 14px;
      min-height: 52px;
      cursor: pointer;
      transition: background-color 120ms ease-out, border-color 120ms ease-out;
    }

    button:active {
      background: var(--btn-bg-active-subtle);
      border-color: var(--btn-border-active);
      transition: none;
    }

    button.primary:active {
      background: var(--btn-bg-active);
      color: var(--text-on-accent);
    }

    button.danger { color: var(--btn-danger); }
    button.danger:active {
      background: var(--btn-danger-active);
      color: var(--text-primary);
    }

    [hidden] { display: none !important; }

    /* ---------- Responsive ---------- */
    @media (min-width: 600px) {
      #app {
        max-width: 420px;
        margin-inline: auto;
        border-inline: 1px solid var(--bg-elevated);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="status-bar">
      <span class="status-dot" data-bind="status-dot"></span>
      <span class="status-text" data-bind="status-text">Disconnected</span>
    </div>

    <div class="remote-body">
      <!-- Setup: shown when disconnected and no saved settings -->
      <div class="setup-form" data-view="setup">
        <label for="host">Server address</label>
        <input id="host" type="url" placeholder="http://rpi:8080" autocomplete="url"
               inputmode="url" data-bind="host-input">
        <label for="secret">Secret (optional)</label>
        <input id="secret" type="text" placeholder="secret" autocomplete="off"
               data-bind="secret-input">
        <button class="primary" data-action="connect">Connect</button>
      </div>

      <!-- Remote: shown when connected (placeholder for next iteration) -->
      <div data-view="remote" hidden>
        <p class="placeholder">Remote UI — next iteration</p>
      </div>
    </div>
  </div>
  <script src="js/app.js" type="module"></script>
</body>
</html>
