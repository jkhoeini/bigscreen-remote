<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Bigscreen Remote</title>

  <meta name="theme-color" content="#16191d">
  <meta name="description" content="Remote control for KDE Plasma Bigscreen">

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bigscreen">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    /* ============ Design tokens ============ */
    :root {
      color-scheme: dark;
      --bg-base: #000000;
      --bg-surface: #16191d;
      --bg-elevated: #232629;
      --bg-inset: #0b0d0f;
      --accent: #3daee9;
      --accent-dim: #1e6a94;
      --accent-purple: #7c5fd3;
      --accent-purple-dim: #4b3a82;
      --btn-bg: #24282e;
      --btn-bg-active: #3daee9;
      --btn-bg-active-subtle: #31363b;
      --btn-border: #31363b;
      --btn-border-active: #3daee9;
      --btn-danger: #da4453;
      --btn-danger-active: #a3323e;
      --text-primary: #fcfcfc;
      --text-secondary: #9aa1a9;
      --text-disabled: #4d5157;
      --text-on-accent: #0d1114;
      --status-ok: #2ecc71;
      --status-warn: #f67400;
    }

    /* ============ Reset & shell ============ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      position: fixed;
      inset: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    [hidden] { display: none !important; }

    #app {
      height: 100%;
      display: grid;
      grid-template-rows: 2.5rem 1fr 18rem 4.5rem;
      gap: 14px;
      padding: calc(env(safe-area-inset-top, 0px) + 8px)
               calc(env(safe-area-inset-right, 0px) + 16px)
               calc(env(safe-area-inset-bottom, 0px) + 12px)
               calc(env(safe-area-inset-left, 0px) + 16px);
    }

    /* ============ Button base ============ */
    button {
      font: inherit;
      border: 0;
      background: none;
      color: inherit;
      -webkit-user-select: none;
      user-select: none;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      cursor: pointer;
      color: var(--text-primary);
      background: linear-gradient(180deg, var(--bg-elevated), var(--btn-bg));
      border: 1px solid var(--btn-border);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #ffffff 7%, transparent),
        0 2px 5px color-mix(in srgb, #000000 55%, transparent);
      transition: transform .08s ease, background .12s ease, color .12s ease,
                  border-color .12s ease, box-shadow .12s ease;
    }

    .btn:active,
    .btn.is-pressed {
      transform: scale(.96);
      background: var(--btn-bg-active-subtle);
      border-color: color-mix(in srgb, var(--accent) 35%, var(--btn-border));
      box-shadow: inset 0 2px 6px color-mix(in srgb, #000000 45%, transparent);
      color: var(--accent);
    }

    /* ============ Top bar ============ */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 30px;
      padding: 0 12px 0 10px;
      border-radius: 999px;
      background: var(--bg-surface);
      border: 1px solid var(--btn-border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-disabled);
      flex: none;
      transition: background .2s ease, box-shadow .2s ease;
    }

    #status.connected .status-dot {
      background: var(--status-ok);
      box-shadow: 0 0 8px color-mix(in srgb, var(--status-ok) 65%, transparent);
    }
    #status.connected .status-label::after { content: "Connected"; }

    #status.connecting .status-dot {
      background: var(--status-warn);
      animation: status-pulse 1.1s ease-in-out infinite;
    }
    #status.connecting .status-label::after { content: "Connecting"; }

    #status.disconnected {
      color: var(--btn-danger);
      border-color: color-mix(in srgb, var(--btn-danger) 40%, var(--btn-border));
    }
    #status.disconnected .status-dot { background: var(--btn-danger); }
    #status.disconnected .status-label::after { content: "Offline"; }

    #status.auth-failed {
      color: var(--btn-danger);
      border-color: color-mix(in srgb, var(--btn-danger) 40%, var(--btn-border));
    }
    #status.auth-failed .status-dot { background: var(--btn-danger); }
    #status.auth-failed .status-label::after { content: "Auth Failed"; }

    @keyframes status-pulse { 50% { opacity: .3; } }

    .btn-gear {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 17px;
      color: var(--text-secondary);
      background: var(--bg-surface);
    }

    /* ============ Setup overlay ============ */
    .setup-wrap {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--bg-base) 92%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .setup-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
      padding: 24px;
    }

    .setup-form label {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .setup-form input {
      font: inherit;
      background: var(--bg-inset);
      color: var(--text-primary);
      border: 1px solid var(--btn-border);
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      box-shadow: inset 0 2px 6px color-mix(in srgb, #000000 50%, transparent);
    }

    .setup-form input:focus {
      border-color: var(--accent-dim);
      box-shadow:
        inset 0 2px 6px color-mix(in srgb, #000000 50%, transparent),
        0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    .setup-form .btn-connect {
      min-height: 48px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-on-accent);
      background: linear-gradient(180deg, var(--accent), var(--accent-dim));
      border: 1px solid var(--btn-border-active);
      box-shadow: 0 4px 16px color-mix(in srgb, var(--accent) 30%, transparent);
    }

    .setup-form .btn-connect:active {
      transform: scale(.97);
      background: var(--accent-dim);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .setup-form .btn-trust {
      min-height: 44px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-surface);
      border: 1px solid var(--btn-border);
    }

    .setup-form .btn-trust:active {
      transform: scale(.97);
      color: var(--text-primary);
      border-color: var(--accent-dim);
    }

    .trust-hint {
      font-size: 11px;
      color: var(--text-disabled);
      line-height: 1.4;
      text-align: center;
    }

    /* ============ Touchpad ============ */
    #touchpad {
      touch-action: none;
      border-radius: 24px;
      border: 1px solid var(--btn-border);
      background-color: var(--bg-inset);
      background-image: radial-gradient(circle,
        color-mix(in srgb, var(--text-secondary) 22%, transparent) 1px,
        transparent 1.5px);
      background-size: 20px 20px;
      background-position: center;
      box-shadow:
        inset 0 2px 12px color-mix(in srgb, #000000 60%, transparent),
        inset 0 -1px 0 color-mix(in srgb, #ffffff 4%, transparent);
      transition: border-color .18s ease, box-shadow .25s ease, background-image .18s ease;
    }

    #touchpad.is-touching {
      border-color: var(--accent-dim);
      background-image: radial-gradient(circle,
        color-mix(in srgb, var(--accent) 50%, transparent) 1px,
        transparent 1.5px);
      box-shadow:
        inset 0 2px 12px color-mix(in srgb, #000000 60%, transparent),
        inset 0 0 70px color-mix(in srgb, var(--accent) 9%, transparent),
        0 0 26px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* ============ Hidden keyboard input ============ */
    #kb-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      font-size: 16px;
      pointer-events: none;
    }

    /* ============ Nav zone: volume rail + 3×3 pad ============ */
    .nav-zone {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .vol-pill {
      display: flex;
      flex-direction: column;
      border-radius: 28px;
      overflow: hidden;
      background: var(--bg-surface);
      border: 1px solid var(--btn-border);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #ffffff 6%, transparent),
        0 2px 6px color-mix(in srgb, #000000 50%, transparent);
    }

    .vol-btn,
    .vol-btn:active,
    .vol-btn.is-pressed {
      border: 0;
      border-radius: 0;
      box-shadow: none;
      transform: none;
    }
    .vol-btn {
      flex: 1;
      background: none;
      font-size: 24px;
      font-weight: 400;
      color: var(--text-primary);
    }
    .vol-btn:active,
    .vol-btn.is-pressed {
      background: color-mix(in srgb, var(--accent) 18%, var(--bg-elevated));
      color: var(--accent);
    }

    .vol-label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 0;
      border-top: 1px solid var(--btn-border);
      border-bottom: 1px solid var(--btn-border);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .16em;
      color: var(--text-disabled);
    }

    .nav-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      aspect-ratio: 1;
      padding: 10px;
      border-radius: 34px;
      background: var(--bg-inset);
      border: 1px solid var(--btn-border);
      box-shadow:
        inset 0 3px 12px color-mix(in srgb, #000000 55%, transparent),
        inset 0 -1px 0 color-mix(in srgb, #ffffff 4%, transparent);
    }

    .pad-arrow {
      border-radius: 20px;
      font-size: 22px;
      color: var(--text-secondary);
    }
    .pad-arrow:active,
    .pad-arrow.is-pressed {
      transform: scale(.95);
      background: var(--btn-bg-active);
      border-color: var(--btn-border-active);
      color: var(--text-on-accent);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .pad-corner {
      flex-direction: column;
      gap: 3px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--bg-surface) 72%, transparent);
      border-color: color-mix(in srgb, var(--btn-border) 65%, transparent);
      box-shadow: none;
      color: var(--text-secondary);
    }
    .pad-corner .glyph { font-size: 19px; line-height: 1; }
    .pad-corner .label {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .15em;
      color: var(--text-disabled);
    }
    .pad-corner:active,
    .pad-corner.is-pressed {
      background: var(--btn-bg-active-subtle);
      color: var(--text-primary);
    }
    .pad-corner:active .label,
    .pad-corner.is-pressed .label { color: var(--text-secondary); }

    .nav-pad > :nth-child(1) { border-top-left-radius: 27px; }
    .nav-pad > :nth-child(3) { border-top-right-radius: 27px; }
    .nav-pad > :nth-child(7) { border-bottom-left-radius: 27px; }
    .nav-pad > :nth-child(9) { border-bottom-right-radius: 27px; }

    .pad-back {
      color: var(--text-primary);
      border-color: color-mix(in srgb, var(--accent) 28%, var(--btn-border));
    }
    .pad-back .glyph {
      color: var(--accent);
      font-size: 24px;
      font-weight: 600;
      margin-top: -3px;
    }
    .pad-back .label { color: var(--text-secondary); }

    .pad-ok {
      border-radius: 50%;
      margin: 3px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--text-on-accent);
      border: 1px solid var(--btn-border-active);
      background:
        radial-gradient(circle at 50% 24%,
          color-mix(in srgb, #ffffff 28%, transparent), transparent 60%),
        linear-gradient(180deg, var(--accent), var(--accent-dim));
      box-shadow:
        0 4px 20px color-mix(in srgb, var(--accent) 38%, transparent),
        inset 0 1px 0 color-mix(in srgb, #ffffff 35%, transparent),
        inset 0 -8px 14px color-mix(in srgb, var(--accent-dim) 55%, transparent);
    }
    .pad-ok:active,
    .pad-ok.is-pressed {
      transform: scale(.93);
      color: var(--text-on-accent);
      border-color: var(--btn-border-active);
      background: linear-gradient(180deg, var(--accent-dim),
        color-mix(in srgb, var(--accent-dim) 70%, #000000));
      box-shadow:
        0 2px 8px color-mix(in srgb, var(--accent) 25%, transparent),
        inset 0 2px 8px color-mix(in srgb, #000000 35%, transparent);
    }

    /* ============ Media row ============ */
    .media-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .media-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      font-size: 20px;
      color: var(--text-secondary);
    }

    .media-mute .label,
    .media-btn .label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .13em;
    }

    .media-play {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      font-size: 27px;
      color: var(--accent);
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, #ffffff 8%, transparent),
        0 4px 12px color-mix(in srgb, #000000 60%, transparent);
    }
    .media-play:active,
    .media-play.is-pressed {
      background: var(--btn-bg-active);
      color: var(--text-on-accent);
      border-color: var(--btn-border-active);
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    [data-action="keyboard"].is-active {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: color-mix(in srgb, var(--accent) 12%, var(--btn-bg));
    }

    /* ============ Responsive ============ */
    @media (min-width: 600px) {
      #app {
        max-width: 420px;
        margin: 0 auto;
      }
    }

    @media (max-height: 700px) {
      #app { grid-template-rows: 2rem 1fr 14rem 3.5rem; gap: 10px; padding-top: calc(env(safe-area-inset-top, 0px) + 6px); }
      #touchpad { border-radius: 20px; }
      .nav-zone { grid-template-columns: 50px 1fr; gap: 10px; }
      .nav-pad { gap: 6px; padding: 8px; border-radius: 28px; }
      .nav-pad > :nth-child(1) { border-top-left-radius: 22px; }
      .nav-pad > :nth-child(3) { border-top-right-radius: 22px; }
      .nav-pad > :nth-child(7) { border-bottom-left-radius: 22px; }
      .nav-pad > :nth-child(9) { border-bottom-right-radius: 22px; }
      .pad-arrow { font-size: 19px; }
      .pad-corner .glyph { font-size: 16px; }
      .pad-ok { font-size: 15px; }
      .media-row { gap: 8px; }
      .media-btn { width: 46px; height: 46px; font-size: 17px; }
      .media-play { width: 60px; height: 60px; font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div id="status" class="disconnected">
        <span class="status-dot"></span><span class="status-label"></span>
      </div>
      <button class="btn btn-gear" data-action="settings" aria-label="Settings">&#x2699;&#xFE0E;</button>
      <input id="kb-input" type="text" enterkeyhint="send" autocomplete="off"
             autocapitalize="off" autocorrect="off" spellcheck="false">
    </header>

    <div class="setup-wrap" id="setup-overlay" hidden>
      <div class="setup-form">
        <label for="host">Server address</label>
        <input id="host" type="url" placeholder="http://rpi:8080" autocomplete="url"
               inputmode="url" data-bind="host-input">
        <label for="secret">Secret (optional)</label>
        <input id="secret" type="text" placeholder="secret" autocomplete="off"
               data-bind="secret-input">
        <button class="btn btn-connect" data-action="connect">Connect</button>
        <button class="btn btn-trust" data-action="trust-cert">Trust Certificate</button>
        <p class="trust-hint">Self-signed cert? Tap "Trust Certificate" first, accept the warning, then come back and Connect.</p>
      </div>
    </div>

    <div id="touchpad" aria-label="Touchpad"></div>

    <section class="nav-zone">
      <div class="vol-pill">
        <button class="btn vol-btn" data-key="VOLUME_UP" data-repeat="true" aria-label="Volume up">+</button>
        <span class="vol-label">VOL</span>
        <button class="btn vol-btn" data-key="VOLUME_DOWN" data-repeat="true" aria-label="Volume down">&#x2212;</button>
      </div>

      <div class="nav-pad">
        <button class="btn pad-corner" data-key="SUPER">
          <span class="glyph">&#x2630;</span><span class="label">MENU</span>
        </button>
        <button class="btn pad-arrow" data-key="UP" data-repeat="true" aria-label="Up">&#x25B4;</button>
        <button class="btn pad-corner" data-key="HOME">
          <span class="glyph">&#x2302;</span><span class="label">HOME</span>
        </button>
        <button class="btn pad-arrow" data-key="LEFT" data-repeat="true" aria-label="Left">&#x25C2;</button>
        <button class="btn pad-ok" data-key="RETURN">OK</button>
        <button class="btn pad-arrow" data-key="RIGHT" data-repeat="true" aria-label="Right">&#x25B8;</button>
        <button class="btn pad-corner" data-key="ESCAPE">
          <span class="glyph">&#x238B;</span><span class="label">ESC</span>
        </button>
        <button class="btn pad-arrow" data-key="DOWN" data-repeat="true" aria-label="Down">&#x25BE;</button>
        <button class="btn pad-corner pad-back" data-key="BROWSER_BACK">
          <span class="glyph">&#x2039;</span><span class="label">BACK</span>
        </button>
      </div>
    </section>

    <footer class="media-row">
      <button class="btn media-btn" data-action="keyboard" aria-label="Keyboard">&#x2328;&#xFE0E;</button>
      <button class="btn media-btn" data-key="MEDIA_PREV_TRACK" aria-label="Previous">&#x23EE;&#xFE0E;</button>
      <button class="btn media-play" data-key="MEDIA_PLAY_PAUSE" aria-label="Play / Pause">&#x23EF;&#xFE0E;</button>
      <button class="btn media-btn" data-key="MEDIA_NEXT_TRACK" aria-label="Next">&#x23ED;&#xFE0E;</button>
      <button class="btn media-btn media-mute" data-key="VOLUME_MUTE" aria-label="Mute">
        <span class="label">MUTE</span>
      </button>
    </footer>
  </div>
  <script src="js/app.js" type="module"></script>
</body>
</html>
