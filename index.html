<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Bigscreen Remote</title>

  <meta name="theme-color" content="#16191d">
  <meta name="description" content="Remote control for KDE Plasma Bigscreen">

  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bigscreen">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div class="status-bar">
      <span class="status-dot"></span>
      <span class="status-text">Disconnected</span>
    </div>
    <div class="remote-body">
      <p class="placeholder">Remote UI loading...</p>
    </div>
  </div>
  <script src="js/app.js" type="module"></script>
</body>
</html>
