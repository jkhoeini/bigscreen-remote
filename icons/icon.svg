      <stop offset="0%" stop-color="#3daee9"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
  </defs>
  <!-- Background squircle -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Remote body -->
  <rect x="176" y="76" width="160" height="360" rx="80" fill="#16191d"/>
  <!-- Power dot -->
  <circle cx="256" cy="126" r="10" fill="#da4453"/>
  <!-- D-pad ring -->
