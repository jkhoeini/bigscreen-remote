  <!-- OK dot -->
  <circle cx="256" cy="236" r="18" fill="#3daee9"/>
  <!-- Media buttons -->
  <rect x="216" y="330" width="32" height="14" rx="7" fill="#31363b"/>
  <rect x="264" y="330" width="32" height="14" rx="7" fill="#31363b"/>
  <!-- Bottom pill -->
